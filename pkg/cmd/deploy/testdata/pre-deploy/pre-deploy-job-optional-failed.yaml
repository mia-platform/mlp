apiVersion: batch/v1
kind: Job
metadata:
  name: pre-deploy-optional-seed-fail
  annotations:
    mia-platform.eu/deploy: pre-deploy
    mia-platform.eu/deploy-optional: "true"
spec:
  backoffLimit: 0
  template:
    metadata: {}
    spec:
      containers:
      - name: seed
        image: busybox
        args:
        - /bin/sh
        - -c
        - echo "optional seed failed!" && exit 1
      restartPolicy: Never
