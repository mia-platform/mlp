apiVersion: batch/v1
kind: Job
metadata:
  name: pre-deploy-migration
  annotations:
    mia-platform.eu/deploy: pre-deploy
spec:
  template:
    metadata: {}
    spec:
      containers:
      - name: migration
        image: busybox
        args:
        - /bin/sh
        - -c
        - echo "running failing migration" && exit 1
      restartPolicy: Never
